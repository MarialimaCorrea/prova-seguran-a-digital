<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Senhas Seguro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Gerador de Senhas Seguro</h1>
        <p class="subtitle">Gere senhas fortes e aleatórias localmente no seu navegador.</p>

        <div class="password-display-container">
            <input type="text" id="password-display" readonly placeholder="Sua senha aparecerá aqui">
            <button id="copy-btn" title="Copiar senha">Copiar</button>
        </div>

        <div class="config-container">
            <div class="config-group">
                <label for="length-slider">Comprimento da senha: <span id="length-val">16</span> caracteres</label>
                <div class="range-container">
                    <input type="range" id="length-slider" min="6" max="32" value="16">
                </div>
            </div>

            <hr>

            <div class="options-grid">
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-uppercase" checked>
                    Letras Maiúsculas (A-Z)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-lowercase" checked>
                    Letras Minúsculas (a-z)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-numbers" checked>
                    Números (0-9)
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="chk-symbols" checked>
                    Símbolos (!@#$%^&*)
                </label>
            </div>

            <hr>

            <div class="strength-container">
                <span class="strength-text">Força da Senha: <strong id="strength-label">Forte</strong></span>
                <div class="strength-bar-bg">
                    <div id="strength-bar" class="strong"></div>
                </div>
            </div>

            <button id="generate-btn">Gerar Nova Senha</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
